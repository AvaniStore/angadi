<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avani — The Organic Store</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2d7a2d">
</head>
<body>
  <div id="auth-screen" class="auth-screen">
    <div class="auth-box">
      <div class="auth-logo">
        <!-- Avani globe+leaf logo SVG -->
        <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Globe -->
          <circle cx="34" cy="42" r="26" fill="#3a9e3a"/>
          <circle cx="34" cy="42" r="26" fill="none" stroke="#2d7a2d" stroke-width="1.5"/>
          <!-- Globe lines -->
          <ellipse cx="34" cy="42" rx="11" ry="26" fill="none" stroke="#2d7a2d" stroke-width="1" opacity="0.5"/>
          <ellipse cx="34" cy="42" rx="20" ry="26" fill="none" stroke="#2d7a2d" stroke-width="1" opacity="0.3"/>
          <line x1="8" y1="42" x2="60" y2="42" stroke="#2d7a2d" stroke-width="1" opacity="0.4"/>
          <line x1="12" y1="30" x2="56" y2="30" stroke="#2d7a2d" stroke-width="1" opacity="0.3"/>
          <line x1="12" y1="54" x2="56" y2="54" stroke="#2d7a2d" stroke-width="1" opacity="0.3"/>
          <!-- Highlight -->
          <ellipse cx="26" cy="32" rx="7" ry="5" fill="white" opacity="0.15" transform="rotate(-20 26 32)"/>
          <!-- Stem -->
          <path d="M34 18 Q36 28 34 16" stroke="#2d7a2d" stroke-width="2.5" stroke-linecap="round"/>
          <!-- Left leaf -->
          <path d="M34 22 Q22 10 20 4 Q30 8 34 22Z" fill="#4caf50"/>
          <path d="M34 22 Q22 10 20 4" stroke="#2d7a2d" stroke-width="1" opacity="0.5"/>
          <!-- Right leaf -->
          <path d="M34 18 Q46 6 50 2 Q40 8 34 18Z" fill="#66bb6a"/>
          <path d="M34 18 Q46 6 50 2" stroke="#2d7a2d" stroke-width="1" opacity="0.5"/>
        </svg>
      </div>
      <h1 class="auth-brand">Avani</h1>
      <p class="auth-tagline">The Organic Store</p>
      <p class="auth-sub">Inventory &amp; billing manager</p>
      <div style="width:100%;margin-top:16px">
        <div class="form-group" style="margin-bottom:10px">
          <input id="auth-email" type="email" placeholder="Email address" autocomplete="email"
            style="width:100%;padding:10px 14px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;outline:none"
            onkeydown="if(event.key==='Enter')document.getElementById('auth-password').focus()">
        </div>
        <div class="form-group" style="margin-bottom:14px">
          <input id="auth-password" type="password" placeholder="Password" autocomplete="current-password"
            style="width:100%;padding:10px 14px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;outline:none"
            onkeydown="if(event.key==='Enter')handleSignIn()">
        </div>
        <div id="auth-error" style="color:#dc2626;font-size:13px;margin-bottom:10px;min-height:18px"></div>
        <button id="auth-btn" onclick="handleSignIn()"
          style="width:100%;padding:11px;background:#2d7a2d;color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer">
          Sign in
        </button>
      </div>
      <p class="auth-note" style="margin-top:14px">Your data is securely synced in real-time.<br>Works on any device, even offline.</p>
    </div>
  </div>

  <div id="app" class="app" style="display:none">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="shop-logo">
          <svg width="32" height="32" viewBox="0 0 72 72" fill="none">
            <circle cx="34" cy="42" r="26" fill="#4caf50"/>
            <ellipse cx="34" cy="42" rx="11" ry="26" fill="none" stroke="#2d7a2d" stroke-width="1.5" opacity="0.6"/>
            <line x1="8" y1="42" x2="60" y2="42" stroke="#2d7a2d" stroke-width="1.5" opacity="0.5"/>
            <line x1="12" y1="30" x2="56" y2="30" stroke="#2d7a2d" stroke-width="1" opacity="0.4"/>
            <line x1="12" y1="54" x2="56" y2="54" stroke="#2d7a2d" stroke-width="1" opacity="0.4"/>
            <path d="M34 22 Q22 10 20 4 Q30 8 34 22Z" fill="#81c784"/>
            <path d="M34 18 Q46 6 50 2 Q40 8 34 18Z" fill="#a5d6a7"/>
          </svg>
        </div>
        <div class="shop-info">
          <div class="shop-name" id="sidebar-shop-name">Avani</div>
          <div class="shop-loc" id="sidebar-shop-loc">Udupi</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item active" onclick="showPage('dashboard',this)" data-page="dashboard">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </a>
        <a class="nav-item" onclick="showPage('inventory',this)" data-page="inventory">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
          Inventory
        </a>
        <a class="nav-item" onclick="showPage('billing',this)" data-page="billing">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          New Bill
        </a>
        <a class="nav-item" onclick="showPage('vendors',this)" data-page="vendors">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
          Vendors
        </a>
        <a class="nav-item" onclick="showPage('reports',this)" data-page="reports">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Reports
        </a>
        <a class="nav-item" onclick="showPage('sales',this)" data-page="sales">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          Sales History
        </a>
        <a class="nav-item" onclick="showPage('customers',this)" data-page="customers">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
          Customers
        </a>
        <a class="nav-item" onclick="showPage('settings',this)" data-page="settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          Settings
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info" id="user-info-sidebar"></div>
        <button class="btn-signout" onclick="handleSignOut()">Sign out</button>
      </div>
    </aside>

    <div class="main-content">
      <div class="topbar">
        <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="topbar-brand">
          <svg width="22" height="22" viewBox="0 0 72 72" fill="none">
            <circle cx="34" cy="42" r="26" fill="#4caf50"/>
            <ellipse cx="34" cy="42" rx="11" ry="26" fill="none" stroke="#2d7a2d" stroke-width="1.5" opacity="0.6"/>
            <line x1="8" y1="42" x2="60" y2="42" stroke="#2d7a2d" stroke-width="1.5" opacity="0.5"/>
            <path d="M34 22 Q22 10 20 4 Q30 8 34 22Z" fill="#81c784"/>
            <path d="M34 18 Q46 6 50 2 Q40 8 34 18Z" fill="#a5d6a7"/>
          </svg>
          <span class="topbar-brand-name">Avani</span>
        </div>
        <div class="topbar-title" id="topbar-title">Dashboard</div>
        <div class="topbar-actions">
          <div class="save-status" id="save-status"></div>
          <div id="online-indicator" style="font-size:12px;margin-right:4px"></div>
          <button id="reconnect-btn" class="btn btn-sm" onclick="reconnectDrive()" title="Reconnect to Google Drive" style="display:none;color:var(--amber);border-color:#fcd34d;font-size:12px">⚠ Reconnect</button>
          <button class="btn-icon" onclick="refreshFromDrive()" title="Refresh from Google Drive">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          </button>
          <button class="btn-icon" onclick="saveToGoogle()" title="Save to Google Drive">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          </button>
        </div>
      </div>

      <div class="pages">
        <div id="page-dashboard" class="page active"></div>
        <div id="page-inventory" class="page"></div>
        <div id="page-billing" class="page"></div>
        <div id="page-vendors" class="page"></div>
        <div id="page-reports" class="page"></div>
        <div id="page-sales" class="page"></div>
        <div id="page-customers" class="page"></div>
        <div id="page-settings" class="page"></div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <div id="print-frame" style="display:none"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script>
    // Initialise Supabase client
    window._sb = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
  </script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/drive.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/offline.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/inventory.js"></script>
  <script src="js/pages/billing.js"></script>
  <script src="js/pages/vendors.js"></script>
  <script src="js/pages/reports.js"></script>
  <script src="js/pages/sales.js"></script>
  <script src="js/pages/customers.js"></script>
  <script src="js/pages/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
